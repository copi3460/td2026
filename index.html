<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Pirates Birkerød 2026</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            margin: 0;
            padding: 1.25rem;
            line-height: 1.4;
            color: #f5d000;
            background: #2b2b2b;
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.4rem, 4vw, 2rem);
        }

        .intro {
            margin: 0.75rem 0 0;
            font-size: clamp(0.95rem, 2.5vw, 1.05rem);
        }

        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .thumb-link {
            text-decoration: none;
            color: #f5d000;
            border: 1px solid #444;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            background: #3a3a3a;
            min-width: 0;
        }

        .thumb-link img {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
        }

        .thumb-link span {
            display: block;
            padding: 0.75rem;
            font-weight: 600;
            text-align: center;
        }

        @media (max-width: 640px) {
            body {
                padding: 0.9rem;
            }

            .thumb-grid {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .thumb-link img {
                aspect-ratio: 16 / 9;
            }

            .thumb-link span {
                padding: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Coding Pirates Birkerød 2026</h1>
        <p class="intro">Towerdefence lavet af Balder, Elliott, Otto, Sayul og William i løbet af forår 2026 hos Coding Pirates Birkerød</p>
        <p><b>Værktøjer:</b> Godot, Paint, Copilot, Audacity</p>

        <div class="thumb-grid">
            <a class="thumb-link" href="./balder-td/index.html">
                <img src="./images/balder-td.png" alt="Balder tower defence thumbnail">
                <span>Balder</span>
            </a>

            <a class="thumb-link" href="./elliott-td/index.html">
                <img src="./images/elliott-td.png" alt="Elliott tower defence thumbnail">
                <span>Elliott</span>
            </a>

            <a class="thumb-link" href="./otto-td/index.html">
                <img src="./images/otto-td.png" alt="Otto tower defence thumbnail">
                <span>Otto</span>
            </a>

            <a class="thumb-link" href="./sayul-td/index.html">
                <img src="./images/sayul-td.png" alt="Sayul tower defence thumbnail">
                <span>Sayul</span>
            </a>

            <a class="thumb-link" href="./william-td/index.html">
                <img src="./images/william-td.png" alt="William tower defence thumbnail">
                <span>William</span>
            </a>
        </div>
    </div>
</body>
</html>
